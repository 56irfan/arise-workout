<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: radial-gradient(circle at 20% 30%, rgba(100, 80, 255, 0.15), rgba(10, 10, 20, 1) 70%);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  color: #ffffff;
}

/* ========== GLASS CORE ========== */
.glass-card, .card, .quest-row, .modal, .nav-glass, .glass-input, .glass-btn, .stat-card {
  background: rgba(20, 20, 35, 0.45);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 28px;
  box-shadow: 0 12px 32px -8px rgba(0, 0, 0, 0.3), 0 0 0 0.5px rgba(255, 255, 255, 0.05) inset;
  transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

/* ========== NEON GLOW EFFECTS ========== */
.neon-glow {
  box-shadow: 0 0 12px rgba(100, 80, 255, 0.4), 0 8px 24px rgba(0, 0, 0, 0.3);
}
.btn-primary, .btn-gold, .active-tab {
  background: rgba(100, 80, 255, 0.85);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.25);
  box-shadow: 0 2px 8px rgba(100, 80, 255, 0.5), 0 0 12px rgba(100, 80, 255, 0.3);
  transition: all 0.2s;
}
.btn-primary:active, .btn-gold:active {
  transform: scale(0.96);
  box-shadow: 0 0 16px rgba(100, 80, 255, 0.7);
}

/* ========== TOGGLE SWITCH ========== */
.toggle-switch {
  position: relative;
  display: inline-block;
  width: 52px;
  height: 28px;
}
.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}
.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: rgba(255,255,255,0.2);
  transition: 0.25s;
  border-radius: 34px;
  backdrop-filter: blur(4px);
}
.slider:before {
  position: absolute;
  content: "";
  height: 22px;
  width: 22px;
  left: 3px;
  bottom: 3px;
  background: white;
  transition: 0.25s;
  border-radius: 50%;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
input:checked + .slider {
  background: linear-gradient(135deg, #6C63FF, #A855F7);
}
input:checked + .slider:before {
  transform: translateX(24px);
}

/* ========== SEARCH BAR (GLASS) ========== */
.search-bar {
  background: rgba(20, 20, 35, 0.55);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 44px;
  padding: 12px 20px;
  font-size: 16px;
  color: white;
  width: 100%;
  outline: none;
  transition: all 0.2s;
  font-weight: 500;
}
.search-bar:focus {
  border-color: #6C63FF;
  box-shadow: 0 0 12px rgba(108, 99, 255, 0.4);
  background: rgba(20, 20, 35, 0.8);
}

/* ========== BASIC RESETS ========== */
html, body {
  height: 100%;
  overflow: hidden;
}
#app {
  height: 100dvh;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}
#content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 90px;
  scrollbar-width: thin;
}
#content::-webkit-scrollbar {
  width: 4px;
}
#content::-webkit-scrollbar-track {
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}
#content::-webkit-scrollbar-thumb {
  background: #6C63FF;
  border-radius: 10px;
}

/* ========== BOTTOM NAVIGATION (GLASS) ========== */
#nav {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 32px);
  max-width: 440px;
  background: rgba(15, 15, 30, 0.7);
  backdrop-filter: blur(28px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 48px;
  display: flex;
  padding: 8px 12px;
  z-index: 100;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 8px 4px;
  color: rgba(255, 255, 255, 0.5);
  transition: all 0.2s;
  font-weight: 500;
  font-size: 12px;
  border-radius: 32px;
}
.nav-btn.active {
  color: #fff;
  background: rgba(108, 99, 255, 0.25);
  text-shadow: 0 0 6px rgba(108, 99, 255, 0.5);
}
.nav-dot {
  width: 5px;
  height: 5px;
  background: #6C63FF;
  border-radius: 4px;
  margin-top: 2px;
  opacity: 0;
}
.nav-btn.active .nav-dot {
  opacity: 1;
  width: 18px;
  box-shadow: 0 0 6px #6C63FF;
}

/* ========== BUTTONS (ROUND + GLASS) ========== */
.btn {
  border: none;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  letter-spacing: -0.2px;
  cursor: pointer;
  transition: 0.15s;
  border-radius: 40px;
  padding: 12px 20px;
  background: rgba(30, 30, 50, 0.7);
  backdrop-filter: blur(16px);
  color: white;
}
.btn-primary {
  background: linear-gradient(105deg, #6C63FF, #8B5CF6);
  box-shadow: 0 6px 18px rgba(108, 99, 255, 0.3);
  border: 0.5px solid rgba(255,255,255,0.2);
}
.btn-gold {
  background: linear-gradient(105deg, #FF6584, #F43F5E);
  box-shadow: 0 6px 18px rgba(244, 63, 94, 0.3);
}
.btn-ghost {
  background: rgba(255,255,255,0.08);
  border: 0.5px solid rgba(255,255,255,0.2);
}

/* ========== QUEST CARD GLASS ========== */
.quest-row {
  background: rgba(20, 20, 35, 0.5);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 14px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.2s;
}
.quest-row.done {
  opacity: 0.55;
  filter: grayscale(0.1);
}
.tag {
  background: rgba(108, 99, 255, 0.2);
  backdrop-filter: blur(8px);
  border-radius: 40px;
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 600;
  color: #C4B5FD;
}

/* ========== MODALS (GLASS) ========== */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(12px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal {
  background: rgba(20, 20, 35, 0.9);
  backdrop-filter: blur(32px);
  border-radius: 44px;
  border: 1px solid rgba(255,255,255,0.15);
  padding: 28px;
  width: 100%;
  max-width: 340px;
}
input, .onboard-input {
  background: rgba(15, 15, 26, 0.7);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 44px;
  padding: 14px 20px;
  color: white;
  font-size: 16px;
  font-weight: 500;
  backdrop-filter: blur(8px);
  width: 100%;
  outline: none;
}
input:focus {
  border-color: #6C63FF;
  box-shadow: 0 0 0 3px rgba(108,99,255,0.2);
}

/* ========== XP & PROGRESS BAR (NEON) ========== */
.xp-track, .prog-track, .stat-bar-track {
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  overflow: hidden;
}
.xp-fill, .prog-fill, .stat-bar-fill {
  height: 100%;
  border-radius: 20px;
  background: linear-gradient(90deg, #6C63FF, #A855F7);
  box-shadow: 0 0 6px #6C63FF;
  transition: width 0.4s ease;
}

/* ========== NOTIFICATION ========== */
#notif {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20,20,35,0.9);
  backdrop-filter: blur(24px);
  border-radius: 60px;
  padding: 12px 24px;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: -0.2px;
  z-index: 300;
  display: none;
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  white-space: nowrap;
}

/* ========== LEVEL UP MODAL ========== */
#lvlup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(20px);
  z-index: 250;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
#lvlup.show { display: flex; animation: fadeScale 0.5s ease; }
@keyframes fadeScale {
  0% { opacity: 0; transform: scale(0.9); }
  100% { opacity: 1; transform: scale(1); }
}
.float { animation: float 3s infinite; }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
</style>
</head>

const auth = firebase.auth(), db = firebase.database();

let deferredPrompt; window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; showInstallButton(); });
function showInstallButton() { if(document.getElementById('installBtn')) return; let btn = document.createElement('button'); btn.id = 'installBtn'; btn.innerHTML = '📲 Install App'; btn.style.cssText = `position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(108,99,255,0.9);backdrop-filter:blur(20px);border-radius:60px;padding:10px 24px;color:white;font-weight:600;z-index:1000;border:1px solid rgba(255,255,255,0.3);`; btn.onclick = async() => { if(deferredPrompt) { deferredPrompt.prompt(); const {outcome} = await deferredPrompt.userChoice; if(outcome === 'accepted') btn.remove(); deferredPrompt = null; } }; document.body.appendChild(btn); }

async function fbSet(p, d) { try { await db.ref(p).set(d); } catch(e) {} }

// ---------- original data ----------
const QT = [ {id:1,title:"Morning Push-ups",desc:"3 sets × 20 reps",xp:50,stat:"strength",cat:"fitness",done:false,icon:"💪"}, {id:2,title:"Squats",desc:"3 sets × 30 reps",xp:50,stat:"strength",cat:"fitness",done:false,icon:"🦵"}, {id:3,title:"Plank Hold",desc:"3 sets × 60 sec",xp:40,stat:"endurance",cat:"fitness",done:false,icon:"🧘"}, {id:4,title:"Pull-ups",desc:"3 sets × 10 reps",xp:60,stat:"strength",cat:"fitness",done:false,icon:"🏋️"}, {id:5,title:"Jumping Jacks",desc:"3 sets × 50 reps",xp:30,stat:"agility",cat:"fitness",done:false,icon:"🤸"}, {id:6,title:"Running",desc:"30 min cardio",xp:70,stat:"endurance",cat:"fitness",done:false,icon:"🏃"}, {id:7,title:"Lunges",desc:"3x20 each leg",xp:45,stat:"strength",cat:"fitness",done:false,icon:"🦶"}, {id:8,title:"Burpees",desc:"3x15 reps",xp:65,stat:"agility",cat:"fitness",done:false,icon:"💥"}, {id:9,title:"Read a Book",desc:"30 min reading",xp:60,stat:"intelligence",cat:"mind",done:false,icon:"📖"}, {id:10,title:"Study",desc:"1h focused",xp:80,stat:"intelligence",cat:"mind",done:false,icon:"🎓"}, {id:11,title:"Meditation",desc:"15 min",xp:50,stat:"vitality",cat:"mind",done:false,icon:"🌿"}, {id:12,title:"Journal",desc:"Write thoughts",xp:35,stat:"intelligence",cat:"mind",done:false,icon:"✍️"}, {id:13,title:"Drink Water",desc:"8 glasses",xp:30,stat:"vitality",cat:"health",done:false,icon:"💧"}, {id:14,title:"Sleep 8h",desc:"Full rest",xp:60,stat:"vitality",cat:"health",done:false,icon:"😴"}, {id:15,title:"Healthy Meal",desc:"Nutritious",xp:40,stat:"vitality",cat:"health",done:false,icon:"🥗"}, {id:16,title:"No Junk Food",desc:"Avoid processed",xp:50,stat:"vitality",cat:"health",done:false,icon:"🚫"}, {id:17,title:"Social",desc:"Conversation",xp:40,stat:"charisma",cat:"social",done:false,icon:"🤝"}, {id:18,title:"Help Someone",desc:"Kind act",xp:45,stat:"charisma",cat:"social",done:false,icon:"💙"} ];

const BOSSES = [{id:1,name:"Kaido",hp:1000,reward:500,desc:"7 days streak",icon:"🐉",diff:"YONKO",color:"#6C63FF"},{id:2,name:"Doflamingo",hp:500,reward:200,desc:"100 push-ups",icon:"🦩",diff:"WARLORD",color:"#FF6584"}];
const SC = { strength:{icon:"⚔️",color:"#6C63FF",label:"Strength"}, intelligence:{icon:"🧠",color:"#A855F7",label:"Intelligence"}, agility:{icon:"⚡",color:"#38BDF8",label:"Agility"}, vitality:{icon:"❤️",color:"#F43F5E",label:"Vitality"}, endurance:{icon:"🛡️",color:"#10B981",label:"Endurance"}, charisma:{icon:"✨",color:"#FBBF24",label:"Charisma"} };
const AT = [{id:1,title:"First Blood",desc:"Complete a quest",icon:"💰",unlocked:false},{id:2,title:"Pirate Crew",desc:"Level 5",icon:"⚓",unlocked:false},{id:3,title:"Will of D",desc:"7d streak",icon:"🔥",unlocked:false},{id:4,title:"Conqueror",desc:"50 quests",icon:"👑",unlocked:false},{id:5,title:"Pirate King",desc:"Level 20",icon:"🏴‍☠️",unlocked:false},{id:6,title:"Balanced",desc:"All stats 50+",icon:"⚖️",unlocked:false}];

function rank(l){ if(l>=20)return{r:"KING",c:"#6C63FF",lb:"Pirate King",icon:"👑"}; if(l>=15)return{r:"YONKO",c:"#FF6584",lb:"Emperor",icon:"🔥"}; if(l>=10)return{r:"NAKAMA",c:"#38BDF8",lb:"Straw Hat",icon:"⚓"}; if(l>=5)return{r:"ROOKIE",c:"#10B981",lb:"Supernova",icon:"✨"}; return{r:"E",c:"#94A3B8",lb:"East Blue",icon:"🌊"}; }
let S={}, tab="dashboard", qF="all", tW=70, cB=null, sT=null;
function xpL(l){ return l*l*100; }
function bmi(){ const h=S.height/100; return (S.weight/(h*h)).toFixed(1); }
function bmiI(b){ if(b<18.5)return{l:"Underweight",c:"#38BDF8"}; if(b<25)return{l:"Normal ✓",c:"#10B981"}; if(b<30)return{l:"Overweight",c:"#FBBF24"}; return{l:"Obese",c:"#F43F5E"}; }
function save(){ document.getElementById('saving').style.display='block'; clearTimeout(sT); sT=setTimeout(async()=>{ await fbSet(`players/${PK}`,S); document.getElementById('saving').style.display='none'; },800); }

let nT=null; function notif(msg,c="#6C63FF"){ const e=document.getElementById('notif'); e.textContent=msg; e.style.borderLeftColor=c; e.style.display='block'; clearTimeout(nT); nT=setTimeout(()=>e.style.display='none',2500); }

function completeQuest(id){ const q=S.quests.find(q=>q.id===id); if(!q||q.done) return; q.done=true; let nx=S.xp+q.xp,nl=S.level,lv=false; while(nx>=xpL(nl)){ nx-=xpL(nl); nl++; lv=true; } S.xp=nx; S.level=nl; S.stats[q.stat]=Math.min(100,S.stats[q.stat]+3); S.totalQuestsDone=(S.totalQuestsDone||0)+1; if(S.totalQuestsDone>=1)S.achievements[0].unlocked=true; if(S.level>=5)S.achievements[1].unlocked=true; if(S.streak>=7)S.achievements[2].unlocked=true; if(S.totalQuestsDone>=50)S.achievements[3].unlocked=true; if(S.level>=20)S.achievements[4].unlocked=true; if(Object.values(S.stats).every(v=>v>=50))S.achievements[5].unlocked=true; save(); if(lv){ document.getElementById('lvlup-txt').innerHTML = `Level ${nl} Unlocked!`; const e=document.getElementById('lvlup'); e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),2500); } else notif(`+${q.xp} XP — ${q.title} ✓`,"#10B981"); render(); }
function saveName(){ const v=document.getElementById('name-input').value.trim(); if(!v)return; S.playerName=v; document.getElementById('name-modal').style.display='none'; save(); render(); notif("✅ Name updated!","#6C63FF"); }
function openBoss(id){ cB=BOSSES.find(b=>b.id===id); if(!cB)return; notif(`⚔️ ${cB.name} accepted!`,"#FF6584"); }
function logWeight(){ S.weight=tW; const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}); const last=S.weightHistory[S.weightHistory.length-1]; if(last&&last.date===today) S.weightHistory[S.weightHistory.length-1].w=tW; else{ if(S.weightHistory.length>=10)S.weightHistory.shift(); S.weightHistory.push({date:today,w:tW}); } document.getElementById('weight-modal').style.display='none'; save(); render(); notif("⚖️ Weight logged!","#38BDF8"); }
function adjW(d){ S.weight=Math.round((Math.max(30,Math.min(200,S.weight+d)))*10)/10; save(); render(); }
function adjH(d){ S.height=Math.max(100,Math.min(250,S.height+d)); save(); render(); }
function setTab(t){ tab=t; document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); document.getElementById('nb-'+t).classList.add('active'); render(); }

// ---------- ONBOARDING FUNCTIONS ----------
let obYear=2000, obWeight=70, obFeet=5, obInch=7;
function showStep(n){ for(let i=1;i<=4;i++){ const el=document.getElementById('ob-step'+i); if(el) el.style.display='none'; } document.getElementById('ob-step'+n).style.display='flex'; }
function adjYear(d){ const now=new Date().getFullYear(); obYear=Math.max(1950,Math.min(now-5,obYear+d)); document.getElementById('ob-year-val').innerText=obYear; document.getElementById('ob-age-show').innerText='Age: '+(now-obYear); }
function obSaveName(){ const v=document.getElementById('ob-name').value.trim(); if(!v){ alert("Enter name"); return; } S.playerName=v; showStep(3); adjYear(0); }
function obSaveYear(){ const now=new Date().getFullYear(); S.birthYear=obYear; S.age=now-obYear; showStep(4); updateObBMI(); }
function adjObW(d){ obWeight=Math.round((Math.max(30,Math.min(200,obWeight+d)))*10)/10; document.getElementById('ob-weight-val').innerText=obWeight; updateObBMI(); }
function adjObFt(d){ obFeet=Math.max(3,Math.min(8,obFeet+d)); document.getElementById('ob-feet-val').innerText=obFeet; updateObBMI(); }
function adjObIn(d){ obInch=Math.max(0,Math.min(11,obInch+d)); document.getElementById('ob-inch-val').innerText=obInch; updateObBMI(); }
function updateObBMI(){ const totalInch=(obFeet*12)+obInch; const cm=totalInch*2.54; const h=cm/100; const bmiVal=(obWeight/(h*h)).toFixed(1); let label='Normal'; if(bmiVal<18.5)label='Underweight'; else if(bmiVal<25)label='Normal ✓'; else if(bmiVal<30)label='Overweight'; else label='Obese'; document.getElementById('ob-bmi-show').innerText=`BMI: ${bmiVal} — ${label}`; }
async function obFinish(){ const totalInch=(obFeet*12)+obInch; S.weight=obWeight; S.height=Math.round(totalInch*2.54); S.heightFeet=obFeet; S.heightInch=obInch; await fbSet(`players/${PK}`,S); document.getElementById('onboarding').style.display='none'; document.getElementById('app').style.display='flex'; render(); }

// render (Liquid UI version, full functional but shortened for brevity – keeps original logic)
function render(){ const rk=rank(S.level), bv=bmi(), bi=bmiI(parseFloat(bv)), done=S.quests.filter(q=>q.done).length, xp=Math.min((S.xp/xpL(S.level))*100,100), el=document.getElementById('content'); if(tab==="dashboard"){
el.innerHTML=`<div style="padding:4px 0"><div style="display:flex;justify-content:space-between;margin-bottom:16px"><div><div style="font-size:12px;opacity:0.7">CREW LOG</div><div style="font-size:26px;font-weight:800;background:linear-gradient(135deg,#fff,#C4B5FD);-webkit-background-clip:text;-webkit-text-fill-color:transparent">NAKAMA</div></div><div class="glass-card" style="padding:8px 16px"><span>🔥 ${S.streak}d</span></div></div><div class="glass-card" style="padding:20px;display:flex;gap:16px;align-items:center"><div style="background:linear-gradient(135deg,#6C63FF,#A855F7);width:68px;height:68px;border-radius:60px;display:flex;align-items:center;justify-content:center;font-size:34px">${rk.icon}</div><div><div style="font-weight:800;font-size:22px">${S.playerName}</div><div style="color:${rk.c}">${rk.r}</div><div style="font-size:32px;font-weight:800">Lv.${S.level}</div></div></div><div class="glass-card" style="margin-top:12px"><div>BOUNTY XP</div><div class="xp-track"><div class="xp-fill" style="width:${xp}%"></div></div><div style="display:flex;justify-content:space-between;margin-top:6px">${S.xp}/${xpL(S.level)}</div></div><div class="glass-card" style="margin-top:12px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div style="text-align:center"><div>📋 TODAY</div><div style="font-size:24px;font-weight:800">${done}/${S.quests.length}</div></div><div style="text-align:center"><div>🏆 AWARDS</div><div style="font-size:24px;font-weight:800">${S.achievements.filter(a=>a.unlocked).length}/${AT.length}</div></div></div></div></div>`; }
else if(tab==="quests"){ const fq = qF==="all"?S.quests:S.quests.filter(q=>q.cat===qF); el.innerHTML=`<div><div class="glass-card" style="margin-bottom:16px"><input type="text" placeholder="🔍 Search quests..." class="search-bar" id="questSearch" oninput="filterQuests(this.value)"></div>${fq.map(q=>`<div class="quest-row ${q.done?'done':''}"><div style="background:rgba(108,99,255,0.2);border-radius:30px;width:44px;height:44px;display:flex;align-items:center;justify-content:center">${q.icon}</div><div style="flex:1"><div style="font-weight:600">${q.title}</div><div style="font-size:12px;opacity:0.7">${q.desc}</div><div style="display:flex;gap:6px;margin-top:6px"><span class="tag">+${q.xp} XP</span></div></div>${!q.done?`<button class="btn btn-primary" style="padding:8px 16px" onclick="completeQuest(${q.id})">✓</button>`:''}</div>`).join('')}</div>`; }
else if(tab==="stats"){ let tx=S.xp; for(let i=1;i<S.level;i++) tx+=xpL(i); el.innerHTML=`<div class="glass-card"><div style="font-weight:800">STATUS</div><div>Total XP: ${tx.toLocaleString()}</div><div>Rank: ${rk.r}</div></div><div class="glass-card">${Object.entries(S.stats).map(([k,v])=>{const c=SC[k]; return `<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between"><span>${c.icon} ${c.label}</span><span>${v}</span></div><div class="stat-bar-track"><div class="stat-bar-fill" style="width:${v}%;background:${c.color}"></div></div></div>`;}).join('')}</div>`; }
else if(tab==="boss"){ el.innerHTML=`<div class="glass-card">${BOSSES.map(b=>`<div style="margin-bottom:12px;cursor:pointer" onclick="openBoss(${b.id})"><div style="display:flex;gap:12px;align-items:center"><span style="font-size:32px">${b.icon}</span><div><div style="font-weight:700">${b.name}</div><div>${b.diff} · +${b.reward} XP</div></div></div></div>`).join('')}</div>`; }
else if(tab==="body"){ const wlog=S.weightHistory.map(w=>w.w).length?S.weightHistory.map(w=>w.w):[S.weight]; const minW=Math.min(...wlog), maxW=Math.max(...wlog), wr=maxW-minW||1; el.innerHTML=`<div class="glass-card"><div style="text-align:center"><div style="font-size:48px;font-weight:800">${bv}</div><div style="color:${bi.c}">${bi.l}</div></div><div style="display:flex;gap:16px;margin-top:16px"><button onclick="adjW(-0.5)" class="btn btn-ghost">-</button><span style="font-weight:700">${S.weight} kg</span><button onclick="adjW(0.5)" class="btn btn-ghost">+</button></div><div style="margin-top:8px"><button onclick="adjH(-1)" class="btn btn-ghost">-</button><span style="margin:0 12px">${S.height} cm</span><button onclick="adjH(1)" class="btn btn-ghost">+</button></div><button class="btn btn-primary" style="margin-top:16px" onclick="openWeightModal()">LOG WEIGHT</button></div><div style="margin-top:16px"><div style="font-weight:600">History</div><div style="display:flex;gap:4px;height:60px;align-items:flex-end">${S.weightHistory.map((it,i)=>{const h=20+((it.w-minW)/wr)*40;return `<div style="flex:1;text-align:center"><div style="height:${h}px;background:#6C63FF;border-radius:6px"></div><div style="font-size:8px">${it.date}</div></div>`;}).join('')}</div></div></div>`; }
else if(tab==="achieve"){ el.innerHTML=`<div class="glass-card"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">${S.achievements.map(a=>`<div style="opacity:${a.unlocked?1:0.5}"><div style="font-size:32px">${a.unlocked?a.icon:"🔒"}</div><div style="font-weight:600">${a.title}</div><div style="font-size:10px">${a.desc}</div></div>`).join('')}</div></div>`; }
}
async function init(){ const saved=await fbGet(`players/${PK}`); const today=new Date().toDateString(); if(saved&&saved.playerName){ S=saved; if(S.lastQuestReset!==today){ S.quests=JSON.parse(JSON.stringify(QT)); if(S.lastQuestReset)S.streak=(S.streak||0)+1; S.lastQuestReset=today; await fbSet(`players/${PK}`,S); } if(!S.achievements||S.achievements.length<AT.length)S.achievements=AT.map(a=>{ const e=(S.achievements||[]).find(x=>x.id===a.id); return e||{...a,unlocked:false}; }); document.getElementById('loading').style.display='none'; document.getElementById('app').style.display='flex'; render(); } else { const now=new Date().getFullYear(); S={ playerName:'', birthYear:2000, age:now-2000, level:1, xp:0, streak:0, totalQuestsDone:0, stats:{strength:10,intelligence:10,agility:10,vitality:10,endurance:10,charisma:10}, weight:70, height:170, weightHistory:[], achievements:JSON.parse(JSON.stringify(AT)), lastQuestReset:today, quests:JSON.parse(JSON.stringify(QT)) }; document.getElementById('loading').style.display='none'; document.getElementById('onboarding').style.display='block'; showStep(1); } }
window.filterQuests = (val) => { if(!val) qF='all'; else { const lower=val.toLowerCase(); const matches = QT.filter(q=>q.title.toLowerCase().includes(lower)).map(q=>q.cat); qF = matches[0]||'all'; } render(); };
window.adjTW = (d)=>{ tW=Math.round((Math.max(30,Math.min(200,tW+d)))*10)/10; document.getElementById('tw-val').innerText=tW; }; window.openWeightModal = ()=>{ tW=S.weight; document.getElementById('tw-val').innerText=tW; document.getElementById('weight-modal').style.display='flex'; };
</script>
</body>
