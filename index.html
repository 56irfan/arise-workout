  let nx=S.xp+q.xp,nl=S.level,lv=false;
  while(nx>=xpL(nl)){nx-=xpL(nl);nl++;lv=true;}
  S.xp=nx;S.level=nl;S.stats[q.stat]=Math.min(100,S.stats[q.stat]+3);S.totalQuestsDone=(S.totalQuestsDone||0)+1;
  save();
  if(lv){
    const e=document.getElementById('lvlup');
    document.getElementById('lvlup-txt').textContent=`Ascended to Level ${nl}`;
    e.classList.remove('hidden');setTimeout(()=>e.classList.replace('opacity-0','opacity-100'),50);
    setTimeout(()=>{e.classList.replace('opacity-100','opacity-0');setTimeout(()=>e.classList.add('hidden'),500);},3000);
  }
  else notif(`EXP +${q.xp} — Task Complete`,"#22c55e");
  render();
}

// Authentication Logic
async function googleLogin() {
  const btn = document.getElementById('google-login-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="animate-pulse">CONNECTING...</span>';
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    await auth.signInWithPopup(provider);
  } catch(e) {
    btn.innerHTML = 'Google Login'; btn.disabled = false;
    const err = document.getElementById('login-error');
    err.classList.remove('hidden'); err.textContent = "AUTH_FAILED: " + e.message;
  }
}

auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user; PK = user.uid;
    document.getElementById('login-screen').style.display = 'none';
    await init();
  }
});

async function init(){
  const saved=await fbGet(`players/${PK}`);
  if(saved){
    S=saved;
    const today=new Date().toDateString();
    if(S.lastQuestReset!==today){
      S.quests=JSON.parse(JSON.stringify(QT));
      if(S.lastQuestReset) S.streak = (S.streak||0)+1;
      S.lastQuestReset=today;
      save();
    }
  } else {
    const defName = currentUser ? (currentUser.displayName||'Hunter').split(' ')[0] : 'Hunter';
    S={playerName:defName,level:1,xp:0,streak:0,totalQuestsDone:0,stats:{strength:10,intelligence:10,agility:10,vitality:10,endurance:10,charisma:10},weight:70</script></body></html>
