<style>
    :root {
      --red: #ffb4ab;
      --gold: #ffdba0;
      --orange: #ffb703;
      --surface: #111415;
      --surface-low: #191c1d;
      --glass: rgba(29, 32, 33, 0.65);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-blur: blur(24px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:var(--surface);overflow:hidden;color:#e1e3e4}
    body{font-family:'Crimson Pro',serif;overscroll-behavior:none}

    /* ── Liquid Corsair Background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 15% 15%, rgba(255, 186, 39, 0.1) 0%, transparent 45%),
        radial-gradient(circle at 85% 85%, rgba(255, 180, 171, 0.08) 0%, transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(17, 20, 21, 1) 0%, #000 100%);
      z-index: -1;
    }

    #app{height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;z-index:1}
    #content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:120px;-webkit-overflow-scrolling:touch}
    #content::-webkit-scrollbar{width:0px}

    /* ── Liquid Glass Navigation ── */
    #nav {
      position: fixed;
      bottom: 24px;
      left: 16px;
      right: 16px;
      max-width: calc(480px - 32px);
      margin: 0 auto;
      background: var(--glass);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 9999px;
      display: flex;
      padding: 8px;
      z-index: 100;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.1);
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px 4px;
      color: #9e8f78;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Cinzel', serif;
    }

    .nav-btn.active { color: var(--gold); }
    .nav-btn .ni { font-size: 20px; transition: filter 0.3s; }
    .nav-btn.active .ni { filter: drop-shadow(0 0 10px var(--gold)); }
    .nav-btn .nl { font-size: 8px; letter-spacing: 1.5px; font-weight: 700; opacity: 0.7; }
    .nav-btn.active .nl { opacity: 1; }

    .nav-dot {
      width: 4px;
      height: 4px;
      background: var(--gold);
      border-radius: 50%;
      margin-top: 2px;
      opacity: 0;
      box-shadow: 0 0 10px var(--gold);
      transform: scale(0);
      transition: all 0.3s ease;
    }
    .nav-btn.active .nav-dot { opacity: 1; transform: scale(1); }

    /* ── Liquid Glass Cards & Elements ── */
    .card, .quest-row {
      background: var(--glass);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 2rem;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0 20px rgba(255, 255, 219, 0.02);
      transition: transform 0.2s, border-color 0.3s;
    }
    .quest-row:active { transform: scale(0.98); }
    .quest-row.done { border-color: rgba(255, 183, 3, 0.2); opacity: 0.7; }

    /* ── Liquid Buttons ── */
    .btn {
      cursor: pointer;
      border: none;
      font-family: 'Cinzel', serif;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      letter-spacing: 1.5px;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      font-weight: 700;
    }
    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: linear-gradient(135deg, #b20213, #800000);
      color: white;
      box-shadow: 0 6px 20px rgba(178, 2, 19, 0.4), inset 0 2px 10px rgba(255, 255, 255, 0.2);
    }

    .btn-gold {
      background: linear-gradient(135deg, #ffb703, #fb8500);
      color: #111;
      box-shadow: 0 6px 20px rgba(255, 183, 3, 0.4), inset 0 2px 10px rgba(255, 255, 255, 0.4);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      color: #e1e3e4;
      border: 1px solid var(--glass-border);
    }

    /* ── Progress & Stat Bars ── */
    .xp-track { height: 12px; background: rgba(0, 0, 0, 0.4); border-radius: 999px; overflow: hidden; border: 1px solid var(--glass-border); }
    .xp-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, #ffb4ab, #ffdba0, #ffb703, #ffb4ab);
      background-size: 300% 100%;
      animation: liquid 4s infinite linear;
      box-shadow: 0 0 15px rgba(255, 219, 160, 0.5);
    }

    .stat-bar-track { height: 8px; background: rgba(0,0,0,0.3); border-radius: 999px; overflow: hidden; margin-top: 4px; border: 0.5px solid rgba(255,255,255,0.05); }
    .stat-bar-fill { height: 100%; border-radius: 999px; transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); }

    /* ── Typography ── */
    .pirate{font-family:'Pirata One',cursive}
    .cinzel{font-family:'Cinzel',serif}

    /* ── Animations ── */
    @keyframes liquid {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }
    .float { animation: float 4s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

    /* ── Modals ── */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(16px);
      z-index: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal {
      background: var(--glass);
      backdrop-filter: var(--glass-blur);
      border: 1px solid rgba(255, 186, 39, 0.25);
      border-radius: 2.5rem;
      padding: 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.7);
    }

    #notif {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 700;
      background: var(--glass);
      backdrop-filter: blur(12px);
      border-radius: 9999px;
      padding: 14px 28px;
      font-family: 'Cinzel', serif;
      display: none;
      border: 1px solid rgba(255, 183, 3, 0.4);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      animation: slideDown 0.4s ease-out;
    }
    @keyframes slideDown { from { transform: translate(-50%, -100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

    /* Login Specifics */
    #login-screen {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #1a1e20 0%, #000 100%);
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
  </style>
</head>

<div class="modal-bg" id="lvlup" style="display:none; flex-direction:column;">
<div class="card text-center p-12 border-[#ffdba0] bg-black/40">
<div class="float mb-8">
<img src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3Mn5_82qtOd5qaeZQjoqSmGKBaMQ1MRaYZ-p2p52w7bp7_Ieu4wWwDAJh1ERlV4CTYXIHODZqhEzDe_X7gYyeHo8gEgJDqU062yffEFlGgsPh_SNTBjP7ikyeT2HbsONC3FGvdPXsLDUPdzi7kaU88rjRRaf5qvC1mkr008IkU1aOcs3vOEOMCEiTQxghvz9BU-ami0blRdFynA-bOfmsXYSLa0fqXiBHTnt--EoELxr1yhmTLLBda9qv8XdB5HHSy5n35LX-aDo" style="width:120px;height:120px;border-radius:2.5rem;box-shadow:0 0 60px #ffdba0; border: 2px solid #ffdba0"/>
</div>
<div class="pirate text-6xl text-[#ffdba0] tracking-widest drop-shadow-[0_0_25px_rgba(255,183,3,0.9)]">NAKAMA UP!</div>
<div class="cinzel text-xl text-[#e1e3e4] mt-6 font-bold" id="lvlup-txt"></div>
</div>
</div>
<script>
// ══ CORE LOGIC ══
const firebaseConfig = {
  apiKey: "AIzaSyA1APVkDwnBQjmj6VBOfPFb036d8KEqDdc",
  authDomain: "arise-app-c49a3.firebaseapp.com",
  databaseURL: "https://arise-app-c49a3-default-rtdb.firebaseio.com",
  projectId: "arise-app-c49a3",
  storageBucket: "arise-app-c49a3.firebasestorage.app",
  messagingSenderId: "890346357822",
  appId: "1:890346357822:web:56b278c74348c63df3fd6f"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser = null, PK = "irfan_player", S={}, tab="dashboard", sT=null;

const QT=[
  {id:1,title:"Morning Push-ups",desc:"3 sets × 20 reps",xp:50,stat:"strength",cat:"fitness",done:false,icon:"💪"},
  {id:2,title:"Squats",desc:"3 sets × 30 reps",xp:50,stat:"strength",cat:"fitness",done:false,icon:"🦵"},
  {id:3,title:"Plank Hold",desc:"3 sets × 60 seconds",xp:40,stat:"endurance",cat:"fitness",done:false,icon:"🧘"},
  {id:4,title:"Pull-ups",desc:"3 sets × 10 reps",xp:60,stat:"strength",cat:"fitness",done:false,icon:"🏋️"},
  {id:5,title:"Jumping Jacks",desc:"3 sets × 50 reps",xp:30,stat:"agility",cat:"fitness",done:false,icon:"🤸"},
  {id:6,title:"Running / Walk",desc:"30 minutes cardio",xp:70,stat:"endurance",cat:"fitness",done:false,icon:"🏃"},
  {id:9,title:"Read a Book",desc:"30 minutes reading",xp:60,stat:"intelligence",cat:"mind",done:false,icon:"📖"},
  {id:11,title:"Meditation",desc:"15 minutes mindfulness",xp:50,stat:"vitality",cat:"mind",done:false,icon:"🌿"},
  {id:13,title:"Drink Water",desc:"8 glasses throughout day",xp:30,stat:"vitality",cat:"health",done:false,icon:"💧"}
];

const BOSSES=[
  {id:1,name:"Kaido",hp:1000,reward:500,desc:"Complete ALL quests for 7 days straight",icon:"🐉",diff:"YONKO"},
  {id:2,name:"Doflamingo",hp:500,reward:200,desc:"Do 100 push-ups in a single day",icon:"🦩",diff:"WARLORD"}
];

const SC={
  strength:{icon:"⚔️",color:"#ffb4ab",label:"Strength"},
  intelligence:{icon:"🧠",color:"#bbc7df",label:"Intelligence"},
  agility:{icon:"⚡",color:"#ffdba0",label:"Agility"},
  vitality:{icon:"❤️",color:"#ffb703",label:"Vitality"},
  endurance:{icon:"🛡️",color:"#d7e3fc",label:"Endurance"},
  charisma:{icon:"✨",color:"#d5e0f9",label:"Charisma"}
};

auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    PK = user.uid;
    document.getElementById('login-screen').style.display = 'none';
    await init();
  } else {
    document.getElementById('loading').style.display = 'none';
  }
});

async function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try { await auth.signInWithPopup(provider); } catch(e) { alert("Login failed"); }
}

async function init() {
  const data = await db.ref(`players/${PK}`).get();
  if (data.exists()) {
    S = data.val();
  } else {
    S = {
      level: 1, xp: 0, stats: {strength:10,intelligence:10,agility:10,vitality:10,endurance:10,charisma:10},
      quests: QT, playerName: "Pirate", streak: 0, weight: 70, height: 175
    };
    await db.ref(`players/${PK}`).set(S);
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  render();
}

function save() {
  document.getElementById('saving').style.display = 'block';
  clearTimeout(sT);
  sT = setTimeout(async () => {
    await db.ref(`players/${PK}`).set(S);
    document.getElementById('saving').style.display = 'none';
  }, 1500);
}

function xpL(l) { return l * l * 100; }
function rank(l) {
  if(l>=20) return {r:"KING",c:"#ffdba0",lb:"Pirate King"};
  if(l>=10) return {r:"NAKAMA",c:"#ffb703",lb:"Straw Hat"};
  return {r:"ROOKIE",c:"#9e8f78",lb:"East Blue Pirate"};
}

function setTab(t) {
  tab = t;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nb-'+t).classList.add('active');
  render();
}

function completeQuest(id) {
  const q = S.quests.find(x => x.id === id);
  if (!q || q.done) return;
  q.done = true;
  S.xp += q.xp;
  S.stats[q.stat] = Math.min(100, S.stats[q.stat] + 2);
  
  if (S.xp >= xpL(S.level)) {
    S.xp -= xpL(S.level);
    S.level++;
    showLvlUp();
  }
  save();
  render();
}

function showLvlUp() {
  document.getElementById('lvlup-txt').textContent = `Level ${S.level} — ${rank(S.level).lb}`;
  document.getElementById('lvlup').style.display = 'flex';
  setTimeout(() => document.getElementById('lvlup').style.display = 'none', 3000);
}

function render() {
  const cont = document.getElementById('content');
  if (tab === 'dashboard') {
    cont.innerHTML = `
      <div class="p-6">
        <div class="flex items-center gap-5 mb-8">
          <img src="icon-192.png" class="w-20 h-20 rounded-2xl border-2 border-[#ffdba0]/30 shadow-lg"/>
          <div>
            <div class="pirate text-3xl text-[#ffdba0] leading-none mb-1">${S.playerName}</div>
            <div class="cinzel text-[10px] tracking-widest text-[#9e8f78]">${rank(S.level).lb} • LVL ${S.level}</div>
          </div>
        </div>
        
        <div class="card p-6 mb-8">
          <div class="flex justify-between items-end mb-3">
            <span class="cinzel text-[11px] tracking-widest text-[#ffdba0]">EXP PROGRESS</span>
            <span class="cinzel text-[11px] font-bold text-white">${S.xp} / ${xpL(S.level)}</span>
          </div>
          <div class="xp-track"><div class="xp-fill" style="width:${(S.xp/xpL(S.level))*100}%"></div></div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
          ${Object.entries(S.stats).map(([k, v]) => `
            <div class="card p-4 mb-0">
              <div class="flex items-center gap-2 mb-2">
                <span class="text-lg">${SC[k].icon}</span>
                <span class="cinzel text-[10px] tracking-widest text-[#9e8f78] uppercase">${SC[k].label}</span>
              </div>
              <div class="text-2xl font-black text-white mb-1">${v}</div>
              <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${v}%; background:${SC[k].color}"></div></div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } else if (tab === 'quests') {
    cont.innerHTML = `
      <div class="p-6">
        <div class="pirate text-4xl text-[#ffdba0] mb-6 tracking-widest">DAILY LOG</div>
        ${S.quests.map(q => `
          <div class="quest-row flex items-center gap-4 ${q.done?'done':''}" onclick="completeQuest(${q.id})">
            <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl bg-black/30 border border-white/5">${q.icon}</div>
            <div class="flex-1">
              <div class="cinzel text-sm font-bold text-white mb-0.5">${q.title}</div>
              <div class="text-[11px] text-[#9e8f78]">${q.desc}</div>
            </div>
            <div class="text-right">
              <div class="cinzel text-[10px] text-[#ffdba0] font-black">+${q.xp} XP</div>
              <div class="text-[14px] mt-1">${q.done?'✅':'⚓'}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  } else if (tab === 'boss') {
    cont.innerHTML = `
      <div class="p-6">
        <div class="pirate text-4xl text-[#ffdba0] mb-6 tracking-widest">WANTED LIST</div>
        <div class="grid grid-cols-1 gap-4">
          ${BOSSES.map(b => `
            <div class="card flex items-center gap-5 p-5 border-[#ffb4ab]/20" onclick="openBoss(${b.id})">
              <div class="text-6xl">${b.icon}</div>
              <div class="flex-1">
                <div class="cinzel text-[10px] tracking-widest text-[#ffb4ab] mb-1">${b.diff}</div>
                <div class="cinzel text-xl font-black text-white">${b.name}</div>
                <div class="text-[12px] text-[#9e8f78] mt-1">HP: ${b.hp}</div>
              </div>
              <div class="text-right">
                 <div class="text-xs text-[#9e8f78] mb-1">REWARD</div>
                 <div class="cinzel text-[#ffdba0] font-black">${b.reward} XP</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } else {
    cont.innerHTML = `<div class="p-10 text-center cinzel text-[#9e8f78] tracking-widest">CHARTING NEW WATERS...</div>`;
  }
}

function openBoss(id) {
  const b = BOSSES.find(x => x.id === id);
  document.getElementById('bm-icon').textContent = b.icon;
  document.getElementById('bm-name').textContent = b.name;
  document.getElementById('bm-diff').textContent = b.diff;
  document.getElementById('bm-desc').textContent = b.desc;
  document.getElementById('bm-hp').textContent = b.hp;
  document.getElementById('bm-xp').textContent = b.reward;
  document.getElementById('boss-modal').style.display = 'flex';
}

// PWA Support
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (!document.getElementById('installBtn')) {
    const btn = document.createElement('button');
    btn.id = 'installBtn';
    btn.innerHTML = '⚓ INSTALL';
    btn.className = 'btn btn-primary fixed bottom-[110px] left-1/2 -translate-x-1/2 z-[200] px-8 py-3 text-xs';
    btn.onclick = async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') btn.remove();
        deferredPrompt = null;
      }
    };
    document.body.appendChild(btn);
  }
});
</script>
